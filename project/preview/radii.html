<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--xlx-bg);color:var(--xlx-fg)}
  .card{padding:24px;height:170px;box-sizing:border-box;display:flex;align-items:center;justify-content:space-around;gap:16px}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px;font-family:var(--xlx-font-mono);font-size:10px;color:var(--xlx-fg-3);letter-spacing:.04em}
  .box{width:64px;height:64px;background:var(--xlx-ink-800);border:1px solid var(--xlx-border-2)}
  .item b{color:var(--xlx-fg-1);font-weight:500}
</style></head>
<body class="xlx-page">
<div class="card">
  <div class="item"><div class="box" style="border-radius:4px"></div><b>xs</b><span>4px</span></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><b>sm</b><span>8px</span></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><b>md</b><span>12px</span></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><b>lg</b><span>16px</span></div>
  <div class="item"><div class="box" style="border-radius:24px"></div><b>xl</b><span>24px</span></div>
  <div class="item"><div class="box" style="border-radius:999px;width:96px"></div><b>pill</b><span>999px</span></div>
</div>
</body></html>
