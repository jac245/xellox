<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--xlx-bg);color:var(--xlx-fg);font-family:var(--xlx-font-body)}
  .card{padding:20px;display:flex;gap:12px;align-items:stretch;height:160px;box-sizing:border-box}
  .swatch{flex:1;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;font-family:var(--xlx-font-mono);font-size:11px;letter-spacing:.04em;border:1px solid rgba(255,255,255,0.06)}
  .name{opacity:.75;text-transform:uppercase}
  .hex{font-weight:600;margin-top:2px}
  .dark{color:#fff}
  .ldark{color:#1a0d00}
</style></head>
<body class="xlx-page">
<div class="card">
  <div class="swatch dark" style="background:var(--xlx-orange-100)"><div class="ldark"><div class="name" style="color:#6b3700">100</div><div class="hex" style="color:#6b3700">#FFE1C8</div></div></div>
  <div class="swatch ldark" style="background:var(--xlx-orange-300)"><div class="name">300</div><div class="hex">#FF9D54</div></div>
  <div class="swatch ldark" style="background:var(--xlx-orange-500);box-shadow:var(--xlx-glow-orange-soft)"><div class="name">500 · primary</div><div class="hex">#F7931A</div></div>
  <div class="swatch dark" style="background:var(--xlx-orange-600)"><div class="name">600</div><div class="hex">#D97608</div></div>
  <div class="swatch dark" style="background:var(--xlx-orange-800)"><div class="name">800</div><div class="hex">#6B3700</div></div>
</div>
</body></html>
