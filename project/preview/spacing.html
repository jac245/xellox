<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--xlx-bg);color:var(--xlx-fg)}
  .card{padding:24px 28px;height:200px;box-sizing:border-box;display:flex;flex-direction:column;gap:8px;justify-content:center}
  .row{display:flex;align-items:center;gap:14px;font-family:var(--xlx-font-mono);font-size:11px;color:var(--xlx-fg-2)}
  .row .key{width:36px;color:var(--xlx-fg-3)}
  .row .val{width:48px}
  .bar{background:var(--xlx-orange-500);height:8px;border-radius:2px}
</style></head>
<body class="xlx-page">
<div class="card">
  <div class="row"><span class="key">1</span><span class="val">4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="key">2</span><span class="val">8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="key">3</span><span class="val">12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="key">4</span><span class="val">16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="key">6</span><span class="val">24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="key">8</span><span class="val">32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="key">12</span><span class="val">48px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="key">16</span><span class="val">64px</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="key">24</span><span class="val">96px</span><div class="bar" style="width:96px"></div></div>
  <div class="row"><span class="key">32</span><span class="val">128px</span><div class="bar" style="width:128px"></div></div>
</div>
</body></html>
