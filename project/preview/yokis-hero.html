<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:#f6f6f7;color:#0a0a0c;overflow:hidden}
  .card{padding:0;height:360px;box-sizing:border-box;position:relative;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 60%,#fff 0%,#ececef 60%,#d8d8dc 100%)}
  .stage{perspective:1400px;width:280px;height:280px}
  .plate{position:relative;width:100%;height:100%;transform-style:preserve-3d;animation:bob 4s ease-in-out infinite,spin 18s linear infinite;cursor:grab}
  @keyframes bob{0%,100%{translate:0 -4px}50%{translate:0 4px}}
  @keyframes spin{0%{transform:rotateY(0)}100%{transform:rotateY(360deg)}}
  .face{position:absolute;inset:0;backface-visibility:hidden;background:url(../assets/yokis-front.png) center/contain no-repeat;filter:drop-shadow(0 24px 30px rgba(10,10,12,.25))}
  .back{transform:rotateY(180deg);background-image:url(../assets/yokis-plates-trio-cut.png);background-size:90%}
  .label{position:absolute;left:24px;bottom:20px;font-family:var(--xlx-font-mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#6c6c76;display:flex;gap:8px;align-items:center}
  .label .d{width:6px;height:6px;border-radius:999px;background:#0a0a0c}
</style></head>
<body>
<div class="card">
  <div class="stage"><div class="plate"><div class="face"></div><div class="face back"></div></div></div>
  <div class="label"><span class="d"></span>Yokis · drag to rotate · tap to flip</div>
</div>
</body></html>
