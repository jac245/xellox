<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--xlx-bg);color:var(--xlx-fg);font-family:var(--xlx-font-body)}
  .card{padding:20px;display:grid;grid-template-columns:repeat(7,1fr);gap:8px;height:200px;box-sizing:border-box}
  .swatch{border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;font-family:var(--xlx-font-mono);font-size:10px;letter-spacing:.04em;border:1px solid rgba(255,255,255,0.06);min-height:0}
  .name{opacity:.7;text-transform:uppercase;font-size:9px}
  .hex{font-weight:600;font-size:10px}
  .dark{color:#fff}
  .light{color:#1a0d00}
</style></head>
<body class="xlx-page">
<div class="card">
  <div class="swatch dark" style="background:#000"><div class="name">1000</div><div class="hex">#000</div></div>
  <div class="swatch dark" style="background:#0a0a0c"><div class="name">950 bg</div><div class="hex">#0A0A0C</div></div>
  <div class="swatch dark" style="background:#111114"><div class="name">900</div><div class="hex">#111114</div></div>
  <div class="swatch dark" style="background:#1a1a1f"><div class="name">800</div><div class="hex">#1A1A1F</div></div>
  <div class="swatch dark" style="background:#25252c"><div class="name">700</div><div class="hex">#25252C</div></div>
  <div class="swatch dark" style="background:#3a3a44"><div class="name">600</div><div class="hex">#3A3A44</div></div>
  <div class="swatch dark" style="background:#5a5a66"><div class="name">500</div><div class="hex">#5A5A66</div></div>
  <div class="swatch light" style="background:#8a8a96"><div class="name">400</div><div class="hex">#8A8A96</div></div>
  <div class="swatch light" style="background:#b8b8c0"><div class="name">300</div><div class="hex">#B8B8C0</div></div>
  <div class="swatch light" style="background:#d8d8dc"><div class="name">200</div><div class="hex">#D8D8DC</div></div>
  <div class="swatch light" style="background:#ececef"><div class="name">100</div><div class="hex">#ECECEF</div></div>
  <div class="swatch light" style="background:#f6f6f7"><div class="name">50 bg-lt</div><div class="hex">#F6F6F7</div></div>
  <div class="swatch light" style="background:#fff;border:1px solid #e2e2e7"><div class="name">0</div><div class="hex">#FFFFFF</div></div>
  <div class="swatch dark" style="background:linear-gradient(180deg,#e6e6ea,#6e6e78)"><div class="name">steel</div><div class="hex">range</div></div>
</div>
</body></html>
