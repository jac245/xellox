<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--xlx-bg);color:var(--xlx-fg);font-family:var(--xlx-font-body)}
  .card{padding:20px;display:grid;grid-template-columns:repeat(4,1fr);gap:12px;height:140px;box-sizing:border-box}
  .swatch{border-radius:10px;padding:14px;font-family:var(--xlx-font-mono);font-size:11px;display:flex;flex-direction:column;justify-content:space-between;color:#0a0a0c;font-weight:600}
  .name{font-size:10px;letter-spacing:.18em;text-transform:uppercase;opacity:.85}
</style></head>
<body class="xlx-page">
<div class="card">
  <div class="swatch" style="background:#2dd47a"><span class="name">success</span><span>#2DD47A</span></div>
  <div class="swatch" style="background:#ffb84a"><span class="name">warning</span><span>#FFB84A</span></div>
  <div class="swatch" style="background:#ff4757;color:#fff"><span class="name">danger</span><span>#FF4757</span></div>
  <div class="swatch" style="background:#38bdf8"><span class="name">info</span><span>#38BDF8</span></div>
</div>
</body></html>
