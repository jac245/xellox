<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--xlx-bg);color:var(--xlx-fg)}
  .card{padding:24px 28px;height:240px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:space-between}
  .row{display:flex;align-items:baseline;gap:16px}
  .label{font-family:var(--xlx-font-mono);font-size:10px;color:var(--xlx-fg-3);letter-spacing:.18em;text-transform:uppercase;width:80px;flex-shrink:0}
  .demo{font-family:var(--xlx-font-display);color:var(--xlx-fg);line-height:1}
</style></head>
<body class="xlx-page">
<div class="card">
  <div class="row"><span class="label">Hero</span><span class="demo" style="font-size:64px;font-weight:600;letter-spacing:-.02em">Steel that outlives you.</span></div>
  <div class="row"><span class="label">H1</span><span class="demo" style="font-size:44px;font-weight:600;letter-spacing:-.02em">Engrave 24 words</span></div>
  <div class="row"><span class="label">H2</span><span class="demo" style="font-size:32px;font-weight:600;letter-spacing:-.02em">Cold by design</span></div>
  <div class="row"><span class="label">H3</span><span class="demo" style="font-size:24px;font-weight:600">Specifications</span></div>
</div>
</body></html>
