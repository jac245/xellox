<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--xlx-bg);color:var(--xlx-fg)}
  .card{padding:20px 28px;height:200px;box-sizing:border-box;display:flex;flex-direction:column;justify-content:space-around}
  .row{display:flex;align-items:baseline;gap:16px}
  .label{font-family:var(--xlx-font-mono);font-size:10px;color:var(--xlx-fg-3);letter-spacing:.18em;text-transform:uppercase;width:84px;flex-shrink:0}
  .lead{font-family:var(--xlx-font-body);font-size:20px;color:var(--xlx-fg-1);line-height:1.5}
  .body{font-family:var(--xlx-font-body);font-size:16px;color:var(--xlx-fg-1);line-height:1.55}
  .small{font-family:var(--xlx-font-body);font-size:14px;color:var(--xlx-fg-2)}
  .eyebrow{font-family:var(--xlx-font-mono);font-size:12px;color:var(--xlx-accent);letter-spacing:.18em;text-transform:uppercase;font-weight:500}
</style></head>
<body class="xlx-page">
<div class="card">
  <div class="row"><span class="label">Eyebrow</span><span class="eyebrow">YOKIS / 304 STAINLESS</span></div>
  <div class="row"><span class="label">Lead 20</span><span class="lead">Your keys, fire-proofed in surgical steel.</span></div>
  <div class="row"><span class="label">Body 16</span><span class="body">A stack of 4 plates inside an anodized housing. Engrave once. Read it back in 30 years.</span></div>
  <div class="row"><span class="label">Small 14</span><span class="small">Ships from EU in 48 hours · Free shipping over ₿0.005</span></div>
</div>
</body></html>
